<main class="app-shell">
  <header class="hero">
    <div>
      <span class="eyebrow">Geometric Calculator</span>
      <h1>Kalkulator Geometri Interaktif</h1>
      <p>
        Hitung luas, keliling, volume, diagonal, dan luas permukaan untuk
        berbagai bentuk 2D dan 3D secara instan dengan visualisasi interaktif.
      </p>
    </div>
  </header>

  <div class="dashboard-layout">
    <!-- Komponen Kalkulator Utama -->
    <div class="main-content">
      <app-calculator></app-calculator>
    </div>

    <!-- Komponen Riwayat Kalkulasi -->
    <div class="sidebar-content">
      <app-history></app-history>
    </div>
  </div>

  <!-- Komponen Panduan Cara Pakai -->
  <footer class="footer-instructions">
    <app-instructions></app-instructions>
  </footer>
</main>
